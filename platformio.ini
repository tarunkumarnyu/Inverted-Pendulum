; PlatformIO Configuration for Inverted Pendulum
; Board: Arduino Mega 2560
; Motor: CQR37D w/ Encoder (12V, 6.25:1)
; Pendulum Encoder: E38S6 600 PPR
; Driver: L298N Dual H-Bridge

[env:mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200

; Use the PJRC Encoder library for reliable quadrature decoding
lib_deps =
    paulstoffregen/Encoder@^1.4.4
